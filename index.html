<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transparent Paint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div class="toolbar" id="toolbar">
    <div id="white" class="color-btn" style="background: white;"></div>
    <div id="yellow" class="color-btn" style="background: yellow;"></div>
    <div id="red" class="color-btn" style="background: red;"></div>
    <div id="blue" class="color-btn" style="background: blue;"></div>
    <div id="black" class="color-btn" style="background: black;"></div>

    <div class="color-picker-wrapper">
        <label for="color-picker">🎨</label>
        <input type="color" id="color-picker" value="#ff0000">
    </div>
    <button id="eraser" class="clear-btn">🧹</button>
    <button id="undo-btn" class="clear-btn">↩️</button>

    <div class="toolbar-opacity-wrapper">
        <button id="toolbar-opacity-btn" class="clear-btn">💧투명도</button>
        <div id="toolbar-opacity-modal" class="opacity-modal hidden">
        <input type="range" id="toolbar-opacity-slider" min="10" max="100" value="50">
        <span id="toolbar-opacity-value">50%</span>
        </div>
    </div>
    <button id="clear" class="clear-btn">🗑️ 전체 지우기</button>
    <button id="toggle-lock">🔓활성화</button>
    </div>
  
  <canvas id="canvas"></canvas>
  
  <script src="renderer.js"></script>
</body>
</html>
